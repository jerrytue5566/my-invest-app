<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Vault - 雲端同步完全體</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #05070a; --card: #111827; --gold: #D4AF37; --gold-bright: #FFD700;
            --text: #f8fafc; --border: #1f2937; --zy-pink: #f472b6; --green: #10b981;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Inter", sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; padding-bottom: 50px; }
        .container { max-width:480px; margin:auto; }

        /* 即時價格看板 */
        .price-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-bottom:15px; }
        .p-box { background: rgba(255, 255, 255, 0.03); padding: 12px 2px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); }
        .p-label { font-size: 10px; color: var(--gold); font-weight: 800; }
        .profit { color: #fff; font-weight: bold; font-size: 12px; }

        /* BSS 面板 */
        .bss-container { background: linear-gradient(180deg, #1e293b 0%, #111827 100%); border: 2px solid var(--gold); border-radius: 20px; padding: 12px; margin-bottom: 15px; text-align: center; }
        .bss-signal { font-size: 15px; font-weight: 900; margin: 4px 0; }
        .bss-logic { font-size: 10px; color: #94a3b8; }

        /* 財富看板 */
        .main-card { 
            background: radial-gradient(circle at top right, #1e293b, #05070a);
            border: 2px solid var(--gold); border-radius: 28px; padding: 25px 20px; text-align: center; margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }
        #totalValue { font-size: 36px; font-weight: 900; text-shadow: 0 0 10px var(--gold); margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .stat-val { font-size: 14px; font-weight: bold; }

        /* 帳戶切換 */
        .user-tab { display: flex; gap: 6px; margin-bottom: 15px; background: #1f2937; padding: 4px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; color: #64748b; font-size: 12px; font-weight: bold; background: transparent; cursor: pointer; }
        .tab-btn.active-jr { background: var(--gold); color: #000; }
        .tab-btn.active-zy { background: var(--zy-pink); color: #fff; }

        /* 輸入與紀錄 */
        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border: 1px solid #374151; }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        input, select { background: #05070a; border: 1px solid #374151; color: #fff; padding: 10px; border-radius: 10px; font-size: 13px; }
        .add-btn { flex: 1; background: var(--gold); color: #000; border: none; border-radius: 10px; font-weight: bold; padding: 10px; cursor: pointer;}
        
        .history-list { margin-top: 12px; max-height: 150px; overflow-y: auto; font-size: 12px; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1f2937; }
        .del-btn { color: #ef4444; border: none; background: none; cursor: pointer; padding: 0 5px; }

        /* 雲端同步 UI */
        .cloud-sync-bar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 10px 15px; border-radius: 15px; margin-bottom: 15px; border: 1px dashed var(--gold); }
        .sync-status { font-size: 10px; color: var(--gold-bright); font-weight: bold; }
        .sync-action-btn { font-size: 10px; background: var(--gold); color: #000; border: none; padding: 4px 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .chart-container { height: 180px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-grid">
        <div class="p-box"><div class="p-label">VOO</div><div id="voo-p" class="profit">677.64</div></div>
        <div class="p-box"><div class="p-label">QQQ</div><div id="qqq-p" class="profit">705.22</div></div>
        <div class="p-box"><div class="p-label">SSO</div><div id="sso-p" class="profit">65.99</div></div>
        <div class="p-box"><div class="p-label">VIX</div><div id="vix-p" class="profit">17.34</div></div>
    </div>

    <div class="cloud-sync-bar">
        <div class="sync-status">📡 雙人連線模式：已啟動</div>
        <button class="sync-action-btn" onclick="shareToPartner()">一鍵傳送給對方</button>
    </div>

    <div class="bss-container">
        <div id="bss-signal" class="bss-signal">載入中...</div>
        <div id="bss-logic" class="bss-logic">數據同步中...</div>
    </div>

    <div class="user-tab">
        <button id="btnJR" class="tab-btn active-jr" onclick="switchUser('jr')">家瑞帳戶</button>
        <button id="btnZY" class="tab-btn" onclick="switchUser('zy')">芷吟帳戶</button>
    </div>

    <div class="main-card">
        <p style="font-size:10px; color:var(--gold); font-weight: bold; letter-spacing: 2px;">LIVE FAMILY ASSETS</p>
        <h1 id="totalValue">NT$ 0</h1>
        <div class="stats-row">
            <div class="stat-item">
                <div style="font-size:10px; color:#94a3b8;">總投入本金</div>
                <div id="totalCost" class="stat-val">0</div>
            </div>
            <div class="stat-item">
                <div style="font-size:10px; color:#94a3b8;">當前總損益</div>
                <div id="totalProfit" class="stat-val">+0</div>
            </div>
        </div>
    </div>

    <div class="card">
        <p style="font-size:13px; font-weight:bold; color:var(--gold);">➕ 存入台幣本金</p>
        <div class="input-group">
            <input type="date" id="logDate" style="width: 100%;">
            <select id="logTicker" style="flex: 1;">
                <option value="VOO">標的：VOO</option>
                <option value="QQQ">標的：QQQ</option>
            </select>
            <input type="number" id="logAmount" placeholder="金額" style="flex: 2;">
            <button class="add-btn" onclick="addRecord()">確認存入</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="card">
        <canvas id="vChart" class="chart-container"></canvas>
    </div>
</div>

<script>
    let currentUser = 'jr';
    let myChart = null;
    let prices = { voo: 677.64, qqq: 705.22, sso: 65.99, vix: 17.34 };
    const basePrices = { voo: 677.64, qqq: 705.22 };
    const apiKey = "Mizli10RkulYZA1eeDqQKfKXfA8iGaji";

    document.getElementById('logDate').valueAsDate = new Date();

    async function syncMarket() {
        try {
            const res = await fetch(`https://financialmodelingprep.com/api/v3/quote/VOO,QQQ,SSO,^VIX?apikey=${apiKey}`);
            const data = await res.json();
            if(data && data.length > 0) {
                data.forEach(item => { prices[item.symbol.replace('^','').toLowerCase()] = item.price; });
            }
        } catch(e) {}
        updateUI();
    }

    function switchUser(u) {
        currentUser = u;
        document.getElementById('btnJR').className = u === 'jr' ? 'tab-btn active-jr' : 'tab-btn';
        document.getElementById('btnZY').className = u === 'zy' ? 'tab-btn active-zy' : 'tab-btn';
        updateUI();
    }

    function getHistory(user) {
        const data = localStorage.getItem('vault_v4_' + user);
        return data ? JSON.parse(data) : [];
    }

    function addRecord() {
        const date = document.getElementById('logDate').value;
        const ticker = document.getElementById('logTicker').value;
        const amount = parseFloat(document.getElementById('logAmount').value);
        if (!date || !amount) return;
        
        const history = getHistory(currentUser);
        history.push({ id: Date.now(), date, ticker, amount });
        localStorage.setItem('vault_v4_' + currentUser, JSON.stringify(history));
        document.getElementById('logAmount').value = '';
        updateUI();
    }

    function deleteRecord(id) {
        let history = getHistory(currentUser);
        history = history.filter(item => item.id !== id);
        localStorage.setItem('vault_v4_' + currentUser, JSON.stringify(history));
        updateUI();
    }

    // --- 關鍵：同步與分享功能 ---
    function shareToPartner() {
        const payload = {
            jr: getHistory('jr'),
            zy: getHistory('zy')
        };
        const blob = btoa(encodeURIComponent(JSON.stringify(payload)));
        const syncUrl = window.location.origin + window.location.pathname + "?data=" + blob;
        
        // 複製到剪貼簿
        navigator.clipboard.writeText(syncUrl).then(() => {
            alert("已生成專屬同步網址！傳給對方後，他點擊網址即可看到你的最新更新。");
        });
    }

    function checkDeepLink() {
        const params = new URLSearchParams(window.location.search);
        const data = params.get('data');
        if (data) {
            try {
                const decoded = JSON.parse(decodeURIComponent(atob(data)));
                if (decoded.jr) localStorage.setItem('vault_v4_jr', JSON.stringify(decoded.jr));
                if (decoded.zy) localStorage.setItem('vault_v4_zy', JSON.stringify(decoded.zy));
                // 清除 URL 參數避免重複覆蓋
                window.history.replaceState({}, document.title, window.location.pathname);
                alert("雲端同步成功！");
            } catch(e) { console.error("同步解析失敗"); }
        }
    }

    function updateUI() {
        const jrHistory = getHistory('jr');
        const zyHistory = getHistory('zy');
        const history = currentUser === 'jr' ? jrHistory : zyHistory;

        // 更新歷史清單
        const listEl = document.getElementById('historyList');
        listEl.innerHTML = '';
        history.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${item.date} [${item.ticker}]</span><b>$${item.amount.toLocaleString()}</b><button class="del-btn" onclick="deleteRecord(${item.id})">×</button>`;
            listEl.appendChild(div);
        });

        // 計算總額 (兩個人相加)
        let totalCost = 0, currentMV = 0;
        [...jrHistory, ...zyHistory].forEach(item => {
            totalCost += item.amount;
            const change = item.ticker === 'VOO' ? (prices.voo/basePrices.voo) : (prices.qqq/basePrices.qqq);
            currentMV += item.amount * change;
        });

        document.getElementById('totalValue').innerText = "NT$ " + Math.round(currentMV).toLocaleString();
        document.getElementById('totalCost').innerText = totalCost.toLocaleString();
        const profit = currentMV - totalCost;
        const pEl = document.getElementById('totalProfit');
        pEl.innerText = (profit >= 0 ? "+" : "") + Math.round(profit).toLocaleString();
        pEl.style.color = profit >= 0 ? "var(--green)" : "#ef4444";

        // BSS 指示燈
        const signalEl = document.getElementById('bss-signal');
        const logicEl = document.getElementById('bss-logic');
        if (prices.vix >= 40) { signalEl.innerText = "👑 十年難得一遇 ALL IN"; signalEl.style.color = "#FF4444"; logicEl.innerText = "恐慌指數極高，建議勇敢投入！"; }
        else { signalEl.innerText = "🔥 定期定額增長中"; signalEl.style.color = "#94A3B8"; logicEl.innerText = "市場穩健，維持投資節奏。"; }
        
        ['voo','qqq','sso','vix'].forEach(s => { document.getElementById(`${s}-p`).innerText = prices[s].toFixed(2); });
        
        renderChart(currentMV, totalCost);
    }

    function renderChart(mv, cost) {
        const ctx = document.getElementById('vChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['總投入本金', '當前市值'], datasets: [{ data: [cost, mv], backgroundColor: ['#1f2937', '#D4AF37'], borderRadius: 10 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, 
            scales: { y: { ticks: { color: '#64748b' }, grid: { display:false } }, x: { ticks: { color: '#fff' } } } }
        });
    }

    window.onload = () => {
        checkDeepLink();
        syncMarket();
    };
    setInterval(syncMarket, 60000);
</script>
</body>
</html>

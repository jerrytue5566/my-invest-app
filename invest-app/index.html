<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我們的財富成長計畫</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { 
      --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
      --sub: #94a3b8; --accent: #38bdf8; --success: #10b981; 
      --danger: #f87171; --zy-color: #f472b6; --jr-color: #38bdf8; 
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: env(safe-area-inset-bottom); }
    .container { max-width: 600px; margin: auto; }
    .market-strip { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
    .price-card { background: var(--card); padding: 12px; border-radius: 16px; min-width: 130px; border-left: 4px solid var(--accent); flex-shrink: 0; }
    .price-val { font-size: 17px; font-weight: bold; margin: 2px 0; }
    .change { font-size: 11px; font-weight: bold; }
    
    /* 損益顯示區 */
    .tracking-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
    .profit-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
    .p-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 14px; text-align: center; }
    .p-label { font-size: 10px; color: var(--sub); margin-bottom: 4px; }
    .p-val { font-size: 13px; font-weight: bold; }
    .total-main { text-align: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }

    /* 設定區塊分開 */
    .config-section { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
    .user-config-group { margin-bottom: 15px; padding: 15px; border-radius: 16px; background: rgba(0,0,0,0.2); }
    .zy-border { border: 1px solid var(--zy-color); }
    .jr-border { border: 1px solid var(--jr-color); }
    .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    input { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px; border-radius: 8px; width: 90px; text-align: right; font-size: 14px; }
    
    .profit { color: var(--success); } .loss { color: var(--danger); }
  </style>
</head>
<body>

<div class="container">
  <div class="market-strip">
    <div class="price-card"><h4>VOO</h4><div id="vooP" class="price-val">--</div><div id="vooC" class="change">--</div></div>
    <div class="price-card"><h4>QQQ</h4><div id="qqqP" class="price-val">--</div><div id="qqqC" class="change">--</div></div>
    <div class="price-card"><h4>SSO</h4><div id="ssoP" class="price-val">--</div><div id="ssoC" class="change">--</div></div>
  </div>

  <div class="tracking-card">
    <div class="total-main">
        <div class="p-label">💎 兩人合計總損益 (TWD)</div>
        <div id="totalP" style="font-size: 28px; font-weight: 800;">NT$ 0</div>
        <div id="totalROI" style="font-size: 12px; font-weight: bold; margin-top: 4px;">+0.00%</div>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Vault Pro - Final Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #05070a; --card: #111827; --gold: #D4AF37; --gold-bright: #FFD700;
            --text: #f8fafc; --border: #1f2937; --zy-pink: #f472b6;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Inter", sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; }
        .container { max-width:480px; margin:auto; }

        .price-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-bottom:15px; }
        .p-box { background: rgba(255, 255, 255, 0.03); padding: 12px 2px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); }
        .p-label { font-size: 10px; color: var(--gold); font-weight: 800; }
        .profit { color: #fff; font-weight: bold; font-size: 12px; }

        .bss-container {
            background: linear-gradient(180deg, #1e293b 0%, #111827 100%);
            border: 2px solid var(--gold); border-radius: 20px;
            padding: 15px; margin-bottom: 15px; text-align: center;
        }
        .bss-signal { font-size: 16px; font-weight: 900; margin: 5px 0; }
        .bss-logic { font-size: 10px; color: #94a3b8; }

        .user-tab { display: flex; gap: 6px; margin-bottom: 15px; background: #1f2937; padding: 4px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; color: #64748b; cursor: pointer; font-size: 12px; font-weight: bold; background: transparent; transition: 0.3s; }
        .tab-btn.active-jr { background: var(--gold); color: #000; }
        .tab-btn.active-zy { background: var(--zy-pink); color: #fff; }
        .tab-btn.active-all { background: linear-gradient(90deg, #B8860B, #FFD700); color: #000; }

        .main-card { 
            background: radial-gradient(circle at top right, #1e293b, #05070a);
            border: 1px solid var(--gold); border-radius: 28px; padding: 25px 20px; text-align: center; margin-bottom: 15px;
        }
        #totalValue { font-size: 36px; margin: 8px 0; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--gold); }
        
        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border: 1px solid #374151; }
        label { font-size: 10px; color: #94a3b8; display: block; margin-bottom: 5px; }
        input { width: 100%; background: #05070a; border: 1px solid #374151; color: #fff; padding: 8px; border-radius: 10px; text-align: center; }
        input[type="range"] { accent-color: var(--gold); margin: 15px 0; }
        .chart-container { height: 180px; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-grid">
        <div class="p-box"><div class="p-label">VOO</div><div id="voo-p" class="profit">677.64</div></div>
        <div class="p-box"><div class="p-label">QQQ</div><div id="qqq-p" class="profit">705.22</div></div>
        <div class="p-box"><div class="p-label">SSO</div><div id="sso-p" class="profit">65.99</div></div>
        <div class="p-box"><div class="p-label">VIX</div><div id="vix-p" class="profit">17.34</div></div>
    </div>

    <div class="bss-container">
        <div style="font-size:10px; color:var(--gold); font-weight: bold;">BSS STRATEGY INDICATOR</div>
        <div id="bss-signal" class="bss-signal">分析中...</div>
        <div id="bss-logic" class="bss-logic">數據同步中...</div>
    </div>

    <div class="user-tab">
        <button id="btnJR" class="tab-btn active-jr" onclick="switchUser('jr')">家瑞</button>
        <button id="btnZY" class="tab-btn" onclick="switchUser('zy')">芷吟</button>
        <button id="btnALL" class="tab-btn" onclick="switchUser('all')">家庭總額</button>
    </div>

    <div class="main-card">
        <p style="font-size:10px; color:var(--gold); font-weight: bold; letter-spacing: 2px;">當前資產市值 (TWD)</p>
        <h1 id="totalValue">NT$ 0</h1>
        <div style="font-size:11px; color:#94a3b8; margin-top:5px;">
            起點：2026/05/07 | 累計投入：1 個月
        </div>
    </div>

    <div class="card" id="inputCard">
        <p style="font-size:12px; color:var(--gold); margin-bottom:10px; font-weight:bold; text-align:center;">每月台幣投入設定</p>
        <div id="jr-inputs" style="display:block;">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>家瑞 VOO</label><input type="number" id="jrVOO" value="14000" oninput="update()"></div>
                <div style="flex:1;"><label>家瑞 QQQ</label><input type="number" id="jrQQQ" value="6000" oninput="update()"></div>
            </div>
        </div>
        <div id="zy-inputs" style="display:none; margin-top: 10px;">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>芷吟 VOO</label><input type="number" id="zyVOO" value="6000" oninput="update()"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <span>年限：<span id="yearVal" style="color:var(--gold)">10</span> 年</span>
            <span>推估年化：<span style="color:var(--gold)">11.5%</span></span>
        </div>
        <input type="range" id="yearSlider" min="1" max="40" value="10" oninput="update()">
        <div class="chart-container"><canvas id="vChart"></canvas></div>
    </div>
</div>

<script>
    let currentUser = 'jr';
    let myChart = null;
    const basePrices = { voo: 677.64, qqq: 705.22 };
    let prices = { voo: 677.64, qqq: 705.22, sso: 65.99, vix: 17.34, twd: 32.85 };
    const apiKey = "Mizli10RkulYZA1eeDqQKfKXfA8iGaji";

    async function syncMarket() {
        try {
            const res = await fetch(`https://financialmodelingprep.com/api/v3/quote/VOO,QQQ,SSO,^VIX?apikey=${apiKey}`);
            const data = await res.json();
            if (data && data.length > 0) {
                data.forEach(item => {
                    let s = item.symbol.replace('^', '').toLowerCase();
                    prices[s] = item.price;
                });
            }
        } catch (e) { console.log("使用保底數據"); }
        updateBSS();
        update();
    }

    function updateBSS() {
        const signalEl = document.getElementById('bss-signal');
        const logicEl = document.getElementById('bss-logic');
        const vix = prices.vix;
        
        if (vix >= 40) {
            signalEl.innerText = "👑 十年難得一遇 ALL IN";
            signalEl.style.color = "#FF4444";
            logicEl.innerText = "VIX > 40。極度恐慌！這是歷史級買點，建議動用加碼資金。";
        } else if (vix >= 26) {
            signalEl.innerText = "⚖️ 可分批逢低買進";
            signalEl.style.color = "#10B981";
            logicEl.innerText = "VIX 26-40。市場修正中，價值顯現，適合分批加碼。";
        } else {
            signalEl.innerText = "🔥 市場狂熱中：定期定額";
            signalEl.style.color = "#94A3B8";
            logicEl.innerText = "VIX < 26。行情穩定，維持原本定期定額節奏即可。";
        }

        ['voo','qqq','sso','vix'].forEach(s => {
            document.getElementById(`${s}-p`).innerText = prices[s].toFixed(2);
        });
    }

    function switchUser(u) {
        currentUser = u;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-jr', 'active-zy', 'active-all'));
        document.getElementById('btn' + u.toUpperCase()).classList.add('active-' + u);
        document.getElementById('jr-inputs').style.display = (u === 'zy' ? 'none' : 'block');
        document.getElementById('zy-inputs').style.display = (u === 'jr' ? 'none' : 'block');
        update();
    }

    function update() {
        const years = parseInt(document.getElementById('yearSlider').value);
        document.getElementById('yearVal').innerText = years;

        const jrV = parseFloat(document.getElementById('jrVOO').value)||0;
        const jrQ = parseFloat(document.getElementById('jrQQQ').value)||0;
        const zyV = parseFloat(document.getElementById('zyVOO').value)||0;

        const jrCurrent = (jrV * (prices.voo/basePrices.voo)) + (jrQ * (prices.qqq/basePrices.qqq));
        const zyCurrent = (zyV * (prices.voo/basePrices.voo));

        let currentTotal = 0;
        let monthlyInvest = 0;
        if(currentUser === 'jr') { currentTotal = jrCurrent; monthlyInvest = jrV + jrQ; }
        else if(currentUser === 'zy') { currentTotal = zyCurrent; monthlyInvest = zyV; }
        else { currentTotal = jrCurrent + zyCurrent; monthlyInvest = jrV + jrQ + zyV; }

        document.getElementById('totalValue').innerText = "NT$ " + Math.round(currentTotal).toLocaleString();

        // 圖表數據：當前本金為起點
        let labels = [], dataPoints = [], costPoints = [];
        const annualRate = 0.115; // 推估年化 11.5%
        for (let i = 0; i <= years; i++) {
            labels.push(i + 'y');
            let futureV = currentTotal * Math.pow(1 + annualRate, i);
            let r = annualRate/12, n = i*12;
            if(n > 0) futureV += monthlyInvest * ((Math.pow(1+r, n)-1)/r);
            dataPoints.push(Math.round(futureV));
            costPoints.push(Math.round(currentTotal + monthlyInvest * 12 * i));
        }
        renderChart(labels, dataPoints, costPoints);
    }

    function renderChart(labels, data, cost) {
        const ctx = document.getElementById('vChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '預估', data: data, borderColor: '#D4AF37', borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: 'rgba(212,175,55,0.1)', tension: 0.4
                }, {
                    label: '成本', data: cost, borderColor: 'rgba(255,255,255,0.1)', borderDash: [5,5], pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b', callback: v => (v/10000)+'萬' }, grid: { color: 'rgba(255,255,255,0.03)' } }, x: { ticks: { color: '#64748b' } } } }
        });
    }

    window.onload = syncMarket;
    setInterval(syncMarket, 60000);
</script>
</body>
</html>

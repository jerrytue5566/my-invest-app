<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CAPE & VIX 投資儀表板</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="投資觀察">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --sub: #94a3b8;
      --accent: #38bdf8;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      padding-bottom: env(safe-area-inset-bottom); /* 確保不被 iPhone 底線遮住 */
    }

    .container { max-width: 800px; margin: auto; }

    h1 { font-size: 28px; margin-bottom: 5px; text-align: center; }
    .subtitle { color: var(--sub); text-align: center; margin-bottom: 25px; font-size: 14px; }

    /* 頂部數據格 */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    .card { background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,.2); }
    .card h2 { font-size: 14px; color: var(--sub); margin-bottom: 8px; }
    .value { font-size: 36px; font-weight: 700; margin-bottom: 8px; }

    .status { display: inline-block; padding: 6px 12px; border-radius: 10px; font-size: 13px; font-weight: 600; }
    .green { background: #14532d; color: #86efac; }
    .yellow { background: #78350f; color: #fde68a; }
    .red { background: #7f1d1d; color: #fca5a5; }

    /* 資產配置區 */
    .allocation { display: flex; gap: 12px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
    .alloc-box { background: var(--card); padding: 15px; border-radius: 18px; flex: 1; min-width: 100px; text-align: center; }
    .alloc-box h4 { font-size: 12px; color: var(--sub); margin-bottom: 5px; }
    .big { font-size: 20px; font-weight: bold; color: var(--accent); }

    /* AI 策略區 */
    .strategy { background: #111827; border-radius: 24px; padding: 25px; margin-top: 15px; border: 1px solid #334155; }
    .strategy h3 { margin-bottom: 10px; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    #actionText { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
    #strategyText { font-size: 16px; line-height: 1.6; color: #cbd5e1; }

    canvas { background: white; border-radius: 20px; padding: 15px; margin-top: 20px; width: 100% !important; }

    .update { text-align: center; margin-top: 20px; color: var(--sub); font-size: 12px; }
  </style>
</head>
<body>

<div class="container">
  <h1>📈 投資觀察儀表板</h1>
  <div class="subtitle">VOO / QQQ 定期定額策略監控</div>

  <div class="grid">
    <div class="card">
      <h2>S&P500 CAPE</h2>
      <div class="value" id="capeValue">--</div>
      <div class="status" id="capeStatus">讀取中</div>
    </div>
    <div class="card">
      <h2>VIX 恐慌指數</h2>
      <div class="value" id="vixValue">--</div>
      <div class="status" id="vixStatus">讀取中</div>
    </div>
  </div>

  <div class="allocation">
    <div class="alloc-box">
      <h4>VOO 配置</h4>
      <div class="big">14,000</div>
    </div>
    <div class="alloc-box">
      <h4>QQQ 配置</h4>
      <div class="big">6,000</div>
    </div>
    <div class="alloc-box">
      <h4>科技股比重</h4>
      <div class="big">30%</div>
    </div>
  </div>

  <div class="strategy">
    <h3>🧠 策略判讀</h3>
    <div id="actionText">計算中...</div>
    <p id="strategyText">正在分析市場數據以提供投資建議。</p>
  </div>

  <canvas id="marketChart" height="180"></canvas>

  <div class="update">
    最後更新時間：<span id="updateTime">--</span>
  </div>
</div>

<script>
  let cape = 36.0;
  let vix = 18.0;

  // 圖表初始化
  const ctx = document.getElementById('marketChart').getContext('2d');
  const marketChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'CAPE', data: [], borderColor: '#f87171', tension: 0.3, yAxisID: 'y' },
        { label: 'VIX', data: [], borderColor: '#38bdf8', tension: 0.3, yAxisID: 'y1' }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: { type: 'linear', display: true, position: 'left', grid: { display: false } },
        y1: { type: 'linear', display: true, position: 'right', grid: { display: false } }
      },
      plugins: { legend: { labels: { boxWidth: 10 } } }
    }
  });

  function updateDashboard() {
    // 模擬波動
    cape = Number((cape + (Math.random() - 0.5) * 0.3).toFixed(1));
    vix = Number((vix + (Math.random() - 0.5) * 1.5).toFixed(1));

    document.getElementById("capeValue").innerText = cape;
    document.getElementById("vixValue").innerText = vix;

    // CAPE 狀態判斷
    const capeEl = document.getElementById("capeStatus");
    if(cape < 25) { capeEl.innerText = "便宜區"; capeEl.className = "status green"; }
    else if(cape < 32) { capeEl.innerText = "合理偏貴"; capeEl.className = "status yellow"; }
    else { capeEl.innerText = "市場偏貴"; capeEl.className = "status red"; }

    // VIX 狀態判斷
    const vixEl = document.getElementById("vixStatus");
    if(vix < 18) { vixEl.innerText = "市場樂觀"; vixEl.className = "status green"; }
    else if(vix < 25) { vixEl.innerText = "中性震盪"; vixEl.className = "status yellow"; }
    else { vixEl.innerText = "市場恐慌"; vixEl.className = "status red"; }

    // 投資決策邏輯
    let action = "";
    let desc = "";

    if(vix > 35) {
      action = "🔥 大力加碼";
      desc = "市場進入極度恐慌，這是分批動用預備金的最佳長期買點。";
    } else if(vix > 25) {
      action = "✅ 開始加碼";
      desc = "市場恐慌情緒升溫，建議在原定定投外增加投入部位。";
    } else if(cape > 35 && vix < 15) {
      action = "⚠️ 避免追高";
      desc = "市場估值過熱且情緒過於樂觀，建議維持定投或保留現金。";
    } else {
      action = "📈 正常定投";
      desc = "目前處於正常波動範圍，請維持原定規律投資計畫。";
    }

    document.getElementById("actionText").innerText = action;
    document.getElementById("strategyText").innerText = desc;
    document.getElementById("updateTime").innerText = new Date().toLocaleString("zh-TW");

    // 更新圖表
    const time = new Date().toLocaleTimeString();
    marketChart.data.labels.push(time);
    marketChart.data.datasets[0].data.push(cape);
    marketChart.data.datasets[1].data.push(vix);
    if(marketChart.data.labels.length > 15) {
      marketChart.data.labels.shift();
      marketChart.data.datasets.forEach(d => d.data.shift());
    }
    marketChart.update();
  }

  setInterval(updateDashboard, 10000);
  updateDashboard();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Vault - 歷史損益版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #05070a; --card: #111827; --gold: #D4AF37; --gold-bright: #FFD700;
            --text: #f8fafc; --border: #1f2937; --zy-pink: #f472b6; --green: #10b981;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Inter", sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; padding-bottom: 50px; }
        .container { max-width:480px; margin:auto; }

        /* 價格看板 */
        .price-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-bottom:15px; }
        .p-box { background: rgba(255, 255, 255, 0.03); padding: 10px 2px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); }
        .p-label { font-size: 10px; color: var(--gold); font-weight: 800; }
        .profit { color: #fff; font-weight: bold; font-size: 12px; }

        /* 核心資產面板 */
        .main-card { 
            background: radial-gradient(circle at top right, #1e293b, #05070a);
            border: 2px solid var(--gold); border-radius: 28px; padding: 25px 20px; text-align: center; margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }
        #totalValue { font-size: 38px; margin: 5px 0; font-weight: 900; color: #fff; }
        .stats-row { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .stat-item { flex: 1; }
        .stat-label { font-size: 10px; color: #94a3b8; margin-bottom: 3px; }
        .stat-val { font-size: 14px; font-weight: bold; }

        /* 歷史紀錄表單 */
        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border: 1px solid #374151; }
        .input-group { display: flex; gap: 8px; margin-top: 10px; }
        input { flex: 1; background: #05070a; border: 1px solid #374151; color: #fff; padding: 10px; border-radius: 12px; font-size: 14px; }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* 歷史清單 */
        .history-list { margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1f2937; font-size: 13px; }
        .del-btn { color: #ef4444; background: none; border: none; font-size: 18px; padding: 0 5px; }

        .user-tab { display: flex; gap: 6px; margin-bottom: 15px; background: #1f2937; padding: 4px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; color: #64748b; font-size: 12px; font-weight: bold; background: transparent; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .tab-btn.active-zy { background: var(--zy-pink); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-grid">
        <div class="p-box"><div class="p-label">VOO</div><div id="voo-p" class="profit">677.64</div></div>
        <div class="p-box"><div class="p-label">QQQ</div><div id="qqq-p" class="profit">705.22</div></div>
        <div class="p-box"><div class="p-label">SSO</div><div id="sso-p" class="profit">65.99</div></div>
        <div class="p-box"><div class="p-label">VIX</div><div id="vix-p" class="profit">17.34</div></div>
    </div>

    <div class="user-tab">
        <button id="btnJR" class="tab-btn active" onclick="switchUser('jr')">家瑞</button>
        <button id="btnZY" class="tab-btn" onclick="switchUser('zy')">芷吟</button>
    </div>

    <div class="main-card">
        <p style="font-size:10px; color:var(--gold); font-weight: bold; letter-spacing: 2px;">當前資產市值 (TWD)</p>
        <h1 id="totalValue">NT$ 0</h1>
        
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">累積本金</div>
                <div id="totalCost" class="stat-val">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">累積損益</div>
                <div id="totalProfit" class="stat-val" style="color:var(--green)">+0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">報酬率</div>
                <div id="profitRate" class="stat-val" style="color:var(--green)">0%</div>
            </div>
        </div>
    </div>

    <div class="card">
        <p style="font-size:14px; font-weight:bold; color:var(--gold);">新增投入紀錄</p>
        <div class="input-group">
            <input type="date" id="logDate">
            <input type="number" id="logAmount" placeholder="台幣金額">
            <button class="add-btn" onclick="addRecord()">存入</button>
        </div>

        <div class="history-list" id="historyList">
            </div>
    </div>
    
    <div style="text-align: center; color: #475569; font-size: 10px;">
        數據存儲於本機瀏覽器，清除快取後將消失
    </div>
</div>

<script>
    let currentUser = 'jr';
    let prices = { voo: 677.64, qqq: 705.22, sso: 65.99, vix: 17.34 };
    const basePrices = { voo: 677.64, qqq: 705.22 }; // 5/7 買入基準

    // 初始化日期為今天
    document.getElementById('logDate').valueAsDate = new Date();

    function switchUser(u) {
        currentUser = u;
        document.getElementById('btnJR').classList.toggle('active', u==='jr');
        document.getElementById('btnZY').classList.toggle('active-zy', u==='zy');
        document.getElementById('btnZY').classList.toggle('active', u==='zy');
        renderHistory();
    }

    function getHistory() {
        const data = localStorage.getItem('vault_history_' + currentUser);
        return data ? JSON.parse(data) : [];
    }

    function addRecord() {
        const date = document.getElementById('logDate').value;
        const amount = parseFloat(document.getElementById('logAmount').value);
        if (!date || !amount) return;

        const history = getHistory();
        history.push({ id: Date.now(), date, amount });
        localStorage.setItem('vault_history_' + currentUser, JSON.stringify(history));
        
        document.getElementById('logAmount').value = '';
        renderHistory();
    }

    function deleteRecord(id) {
        let history = getHistory();
        history = history.filter(item => item.id !== id);
        localStorage.setItem('vault_history_' + currentUser, JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const history = getHistory();
        const listEl = document.getElementById('historyList');
        listEl.innerHTML = '';

        let totalCost = 0;
        history.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(item => {
            totalCost += item.amount;
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span>${item.date}</span>
                <span style="font-weight:bold;">NT$ ${item.amount.toLocaleString()}</span>
                <button class="del-btn" onclick="deleteRecord(${item.id})">×</button>
            `;
            listEl.appendChild(div);
        });

        // 計算即時市值 (簡易邏輯：假設投入按 VOO/QQQ 比例分配)
        // 這裡我們暫用當前價格與基準價格的平均漲幅來模擬損益
        const marketChangeVOO = prices.voo / basePrices.voo;
        const marketChangeQQQ = prices.qqq / basePrices.qqq;
        const avgChange = (currentUser === 'jr') ? (marketChangeVOO * 0.7 + marketChangeQQQ * 0.3) : marketChangeVOO;
        
        const currentMarketValue = totalCost * avgChange;
        const profit = currentMarketValue - totalCost;
        const rate = totalCost > 0 ? (profit / totalCost * 100) : 0;

        // 更新 UI
        document.getElementById('totalValue').innerText = "NT$ " + Math.round(currentMarketValue).toLocaleString();
        document.getElementById('totalCost').innerText = totalCost.toLocaleString();
        const profitEl = document.getElementById('totalProfit');
        profitEl.innerText = (profit >= 0 ? "+" : "") + Math.round(profit).toLocaleString();
        profitEl.style.color = profit >= 0 ? "var(--green)" : "#ef4444";
        
        const rateEl = document.getElementById('profitRate');
        rateEl.innerText = rate.toFixed(2) + "%";
        rateEl.style.color = profit >= 0 ? "var(--green)" : "#ef4444";
    }

    // 初始化
    window.onload = () => {
        // 模擬 5/7 的第一筆紀錄 (如果還沒紀錄的話)
        if (getHistory().length === 0) {
            // 可以在這裡預設第一筆，或者手動輸入
        }
        renderHistory();
    };
</script>
</body>
</html>

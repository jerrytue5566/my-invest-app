<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我們的財富成長計畫</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { 
      --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
      --sub: #94a3b8; --accent: #38bdf8; --success: #10b981; 
      --danger: #f87171; --zy-color: #f472b6; --jr-color: #38bdf8; 
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; padding-bottom: env(safe-area-inset-bottom); }
    .container { max-width: 600px; margin: auto; }
    .market-strip { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
    .price-card { background: var(--card); padding: 12px; border-radius: 16px; min-width: 130px; border-left: 4px solid var(--accent); flex-shrink: 0; }
    .price-val { font-size: 17px; font-weight: bold; margin: 2px 0; }
    .change { font-size: 11px; font-weight: bold; }
    
    /* 成本追蹤區塊 */
    .tracking-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
    .track-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .track-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; text-align: center; }
    .track-label { font-size: 10px; color: var(--sub); margin-bottom: 4px; }
    .track-val { font-size: 15px; font-weight: bold; }
    .profit { color: var(--success); } .loss { color: var(--danger); }

    .config-section { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
    .user-block { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #334155; }
    .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    input { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px 10px; border-radius: 10px; width: 100px; text-align: right; font-size: 14px; }
    .vision-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--success); }
    .up { color: var(--success); } .down { color: var(--danger); }
  </style>
</head>
<body>

<div class="container">
  <div class="market-strip">
    <div class="price-card"><h4>VOO</h4><div id="vooP" class="price-val">--</div><div id="vooC" class="change">--</div></div>
    <div class="price-card"><h4>QQQ</h4><div id="qqqP" class="price-val">--</div><div id="qqqC" class="change">--</div></div>
    <div class="price-card"><h4>SSO</h4><div id="ssoP" class="price-val">--</div><div id="ssoC" class="change">--</div></div>
  </div>

  <div class="tracking-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:bold; color:var(--accent)">📊 現有資產損益 (TWD)</span>
        <span style="font-size:10px; color:var(--sub)">匯率參考: 32.5</span>
    </div>
    <div id="totalProfitTWD" style="font-size:28px; font-weight:800; margin:10px 0;">NT$ 0</div>
    <div class="track-grid">
        <div class="track-item"><div class="track-label">總市值</div><div id="marketVal" class="track-val">--</div></div>
        <div class="track-item"><div class="track-label">總報酬率</div><div id="roiPct" class="track-val">--</div></div>
    </div>
  </div>

  <div class="config-section">
    <div style="font-size:12px; color:var(--sub); margin-bottom:12px">請輸入目前券商持倉數據：</div>
    <div class="input-row"><label style="font-size:13px">VOO 持股數</label><input type="number" id="holdVOO" value="10" oninput="fetchPrices()"></div>
    <div class="input-row"><label style="font-size:13px">VOO 平均成本</label><input type="number" id="costVOO" value="450" oninput="fetchPrices()"></div>
    <hr style="border:0; border-top:1px solid #334155; margin:10px 0">
    <div style="color:var(--success); font-size:12px; margin-bottom:10px; text-align:center; font-weight:bold">📅 每月 7 號定投計畫</div>
    <div class="input-row"><label style="font-size:13px">芷吟 (TWD)</label><input type="number" id="zyV" value="6000" oninput="recalc()"></div>
    <div class="input-row"><label style="font-size:13px">家瑞 (TWD)</label><input type="number" id="jrTotal" value="20000" oninput="recalc()"></div>
  </div>

  <div class="vision-card">
    <div style="color:var(--success); font-weight:bold; margin-bottom:5px">🚀 35 年複利預估</div>
    <div id="f35" style="font-size:24px; color:#fbbf24; font-weight:800;">NT$ --</div>
    <canvas id="vChart" height="150"></canvas>
  </div>
</div>

<script>
  const API_KEY = "Mizli10RkulYZA1eeDqQKfKXfA8iGaji"; 
  let chart;
  const USD_TWD = 32.5;

  async function fetchPrices() {
    try {
      const res = await fetch(`https://financialmodelingprep.com/api/v3/quote/VOO,QQQ,SSO?apikey=${API_KEY}`);
      const data = await res.json();
      
      let currentPriceVOO = 0;
      data.forEach(s => {
        const sym = s.symbol;
        updateUI(sym.toLowerCase(), s);
        if(sym === "VOO") currentPriceVOO = s.price;
      });

      // 損益計算邏輯
      const holdV = parseFloat(document.getElementById('holdVOO').value) || 0;
      const costV = parseFloat(document.getElementById('costVOO').value) || 0;
      
      const marketValUSD = holdV * currentPriceVOO;
      const costValUSD = holdV * costV;
      const profitUSD = marketValUSD - costValUSD;
      const roi = costValUSD > 0 ? (profitUSD / costValUSD * 100).toFixed(2) : 0;

      document.getElementById('totalProfitTWD').innerText = "NT$ " + Math.round(profitUSD * USD_TWD).toLocaleString();
      document.getElementById('totalProfitTWD').className = profitUSD >= 0 ? "profit" : "loss";
      document.getElementById('marketVal').innerText = "NT$ " + Math.round(marketValUSD * USD_TWD).toLocaleString();
      document.getElementById('roiPct').innerText = roi + "%";
      document.getElementById('roiPct').className = "track-val " + (roi >= 0 ? "profit" : "loss");

    } catch (e) { console.log("同步中..."); }
  }

  function updateUI(id, s) {
    document.getElementById(id+'P').innerText = "$" + s.price.toFixed(2);
    const cEl = document.getElementById(id+'C');
    cEl.innerText = (s.changesPercentage > 0 ? "+" : "") + s.changesPercentage.toFixed(2) + "%";
    cEl.className = "change " + (s.changesPercentage >= 0 ? "up" : "down");
  }

  function recalc() {
    const totalM = parseFloat(document.getElementById('zyV').value) + parseFloat(document.getElementById('jrTotal').value);
    const r = 0.08 / 12;
    const calc = (y) => totalM * ((Math.pow(1 + r, y * 12) - 1) / r) * (1 + r);
    document.getElementById('f35').innerText = "NT$ " + Math.round(calc(35)).toLocaleString();

    const labs = [], dataF = [];
    for(let i=0; i<=35; i+=5) { labs.push(i+'y'); dataF.push(Math.round(calc(i))); }

    if(chart) chart.destroy();
    chart = new Chart(document.getElementById('vChart'), {
      type: 'line',
      data: {
        labels: labs,
        datasets: [{ data: dataF, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4 }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#94a3b8' } } } }
    });
  }

  setInterval(fetchPrices, 60000); 
  fetchPrices(); recalc();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黃金財富計畫 Pro - 家瑞 & 芷吟</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --gold: #D4AF37; /* 標準香檳金 */
            --gold-light: #F97316; /* 亮金/橘金 */
            --gold-glow: rgba(212, 175, 55, 0.3);
            --border: #334155;
            --zy: #f472b6; /* 保留芷吟粉，但邊框用金 */
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, "微軟正黑體", sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; }
        .container { max-width:500px; margin:auto; }
        
        /* 價格看板：金色邊框與陰影 */
        .price-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-bottom:15px; }
        .p-box { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 10px 5px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid var(--gold); 
            box-shadow: 0 0 10px var(--gold-glow);
        }
        .p-label { font-size: 10px; color: var(--gold); letter-spacing: 1px; margin-bottom: 2px; }
        .profit { color: #fff; font-weight: bold; font-size: 14px; text-shadow: 0 0 5px var(--gold); }

        /* 建議卡片：金色漸層 */
        .signal-card { 
            padding: 15px; 
            border-radius: 20px; 
            text-align: center; 
            margin-bottom: 15px; 
            font-weight: bold; 
            font-size: 14px;
            background: linear-gradient(90deg, rgba(212,175,55,0.1), rgba(212,175,55,0.2));
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border: 1px solid var(--border); }
        
        /* 切換按鈕：金色風格 */
        .user-tab { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { 
            flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--gold); 
            background: transparent; color: var(--gold); cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .tab-btn.active-jr { background: var(--gold); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--gold-glow); }
        .tab-btn.active-zy { background: var(--zy); color: #fff; border-color: var(--zy); }
        .tab-btn.active-all { background: linear-gradient(45deg, #B8860B, #FFD700); color: #000; font-weight: bold; border: none; }
        
        /* 財富數字 */
        #totalValue { 
            background: linear-gradient(to bottom, #FFF, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        input { background: #0f172a; border: 1px solid var(--gold); color: white; padding: 8px; border-radius: 8px; margin-top: 5px; }
        input[type="range"] { accent-color: var(--gold); margin: 15px 0; }
        .chart-container { height: 200px; }
    </style>
</head>

<div class="container

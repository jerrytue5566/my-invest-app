<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Vault Pro - 實戰準確版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161e2d; --gold: #D4AF37; --gold-bright: #FFD700;
            --text: #f8fafc; --border: #2d3748; --zy-pink: #f472b6;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; }
        .container { max-width:500px; margin:auto; }

        .price-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-bottom:15px; }
        .p-box { 
            background: rgba(255, 255, 255, 0.03); padding: 12px 5px; border-radius: 16px; 
            text-align: center; border: 1px solid var(--gold); box-shadow: 0 0 12px rgba(212, 175, 55, 0.15);
        }
        .p-label { font-size: 10px; color: var(--gold); margin-bottom: 2px; font-weight: bold; }
        .profit { color: #fff; font-weight: bold; font-size: 13px; text-shadow: 0 0 5px var(--gold); }

        /* BSS 策略框：依照你的需求分為三級 */
        .signal-card { 
            padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; 
            font-weight: bold; font-size: 14px; border: 2px solid var(--gold);
            transition: all 0.5s ease;
        }

        .user-tab { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { 
            flex: 1; padding: 12px; border-radius: 14px; border: 1px solid var(--border); 
            background: transparent; color: #94a3b8; cursor: pointer; transition: 0.3s; font-size: 12px;
        }
        .tab-btn.active-jr { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }
        .tab-btn.active-zy { border-color: var(--zy-pink); color: var(--zy-pink); background: rgba(244,114,182,0.1); }
        .tab-btn.active-all { border-color: var(--gold-bright); color: var(--gold-bright); background: rgba(255,215,0,0.1); animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px rgba(255,215,0,0.2); } to { box-shadow: 0 0 15px rgba(255,215,0,0.5); } }

        .main-card { 
            background: radial-gradient(circle at top right, #1e293b, #0b0f1a);
            border: 1px solid var(--gold); border-radius: 28px; padding: 25px; text-align: center; margin-bottom: 15px;
        }
        #totalValue { 
            font-size: 34px; margin: 10px 0; font-weight: 900;
            background: linear-gradient(to bottom, #FFFFFF 40%, var(--gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border: 1px solid var(--border); }
        input { width: 100%; background: #0b0f1a; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 10px; text-align: center; margin-top: 5px; }
        input:focus { border-color: var(--gold); }
        input[type="range"] { accent-color: var(--gold); margin: 15px 0; }
        .chart-container { height: 210px; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-grid">
        <div class="p-box"><div class="p-label">VOO</div><div id="voo-p" class="profit">677.6</div></div>
        <div class="p-box"><div class="p-label">QQQ</div><div id="qqq-p" class="profit">550.2</div></div>
        <div class="p-box"><div class="p-label">SSO</div><div id="sso-p" class="profit">95.4</div></div>
        <div class="p-box"><div class="p-label">VIX</div><div id="vix-p" class="profit">13.5</div></div>
    </div>

    <div id="adviceBox" class="signal-card">掃描市場情緒中...</div>

    <div class="user-tab">
        <button id="btnJR" class="tab-btn active-jr" onclick="switchUser('jr')">家瑞帳戶</button>
        <button id="btnZY" class="tab-btn" onclick="switchUser('zy')">芷吟帳戶</button>
        <button id="btnALL" class="tab-btn" onclick="switchUser('all')">家庭金庫</button>
    </div>

    <div class="main-card">
        <p id="displayTitle" style="font-size:11px; color:var(--gold); letter-spacing: 2px;">GOLDEN WEALTH ESTIMATION</p>
        <h1 id="totalValue">NT$ 0</h1>
        <div style="display:flex; justify-content:space-between; margin-top:15px; font-size:12px;">
            <span style="color:#94a3b8">計畫月投額</span>
            <span id="monthlyInvest" style="color:var(--gold); font-weight:bold;">NT$ 20,000</span>
        </div>
    </div>

    <div class="card" id="inputCard">
        <p style="font-size:12px; color:var(--gold); margin-bottom:10px; font-weight:bold;">現有持股設定 (本金起點)</p>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label style="font-size:10px; color:#94a3b8">VOO 股數</label><input type="number" id="initVOO" value="32" oninput="update()"></div>
            <div style="flex:1;"><label style="font-size:10px; color:#94a3b8">QQQ 股數</label><input type="number" id="initQQQ" value="12" oninput="update()"></div>
            <div style="flex:1;"><label style="font-size:10px; color:#94a3b8">SSO 股數</label><input type="number" id="initSSO" value="0" oninput="update()"></div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:13px;">
            <span>複利時間：<span id="yearVal" style="color:var(--gold); font-weight:bold;">10</span> 年</span>
            <span style="color:#94a3b8">預計回報：<span style="color:var(--gold)">10.5%</span></span>
        </div>
        <input type="range" id="yearSlider" min="1" max="40" value="10" oninput="update()">
        <div class="chart-container"><canvas id="vChart"></canvas></div>
    </div>
</div>

<script>
    let currentUser = 'jr';
    let myChart = null;
    // 依據截圖修正為 2026 最新真實行情
    let prices = { voo: 677.6, qqq: 550.2, sso: 95.4, vix: 13.5, twd: 32.5 };
    const apiKey = "Mizli10RkulYZA1eeDqQKfKXfA8iGaji";

    const config = {
        jr: { plans: [{t:'VOO', m:14000, r:0.09}, {t:'QQQ', m:6000, r:0.12}], color: '#D4AF37' },
        zy: { plans: [{t:'QQQ', m:6000, r:0.12}], color: '#f472b6' },
        all: { color: '#FFD700' }
    };

    async function fetchPrices() {
        try {
            // 嘗試獲取最新價格
            const res = await fetch(`https://financialmodelingprep.com/api/v3/quote/VOO,QQQ,SSO,^VIX?apikey=${apiKey}`);
            const data = await res.json();
            if (data && data.length > 0) {
                data.forEach(item => {
                    let s = item.symbol.replace('^', '').toLowerCase();
                    prices[s] = item.price;
                });
            }
        } catch (e) { console.log("連線受阻，顯示最新保底行情"); }
        
        updateUI();
    }

    function updateUI() {
        ['voo','qqq','sso','vix'].forEach(s => {
            document.getElementById(`${s}-p`).innerText = "$" + prices[s].toFixed(1);
        });

        // BSS 三段式邏輯
        const box = document.getElementById('adviceBox');
        if (prices.vix >= 40) {
            box.innerText = "🚨 十年難得一遇：市場極度崩潰，All In 機會浮現！";
            box.style.background = "rgba(255, 0, 0, 0.4)";
            box.style.color = "#FFD700";
        } else if (prices.vix >= 25) {
            box.innerText = "⚖️ 可分批逢低買進：市場出現修正，價值顯現。";
            box.style.background = "rgba(16, 185, 129, 0.2)";
            box.style.color = "#D4AF37";
        } else {
            box.innerText = "🔥 市場狂熱中：估值偏高，持續定期定額即可。";
            box.style.background = "rgba(255, 255, 255, 0.05)";
            box.style.color = "#94a3b8";
        }
        update();
    }

    function switchUser(u) {
        currentUser = u;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-jr', 'active-zy', 'active-all'));
        document.getElementById('btn' + u.toUpperCase()).classList.add('active-' + u);
        document.getElementById('displayTitle').innerText = (u==='all' ? 'GOLDEN FAMILY VAULT' : u.toUpperCase() + ' ASSET ESTIMATION');
        document.getElementById('inputCard').style.display = (u==='all' ? 'none' : 'block');
        update();
    }

    function update() {
        const years = parseInt(document.getElementById('yearSlider').value);
        document.getElementById('yearVal').innerText = years;

        let plans = (currentUser === 'all') ? [...config.jr.plans, ...config.zy.plans] : config[currentUser].plans;
        let v = parseFloat(document.getElementById('initVOO').value)||0;
        let q = parseFloat(document.getElementById('initQQQ').value)||0;
        let s = parseFloat(document.getElementById('initSSO').value)||0;
        
        let startCapital = (v * prices.voo + q * prices.qqq + s * prices.sso) * prices.twd;
        if(currentUser === 'zy') startCapital = (q * prices.qqq) * prices.twd;

        const monthlyTotal = plans.reduce((a, b) => a + b.m, 0);
        document.getElementById('monthlyInvest').innerText = "NT$ " + monthlyTotal.toLocaleString();

        let labels = [], data = [], cost = [];
        for (let i = 0; i <= years; i++) {
            labels.push(i + 'y');
            let futureV = startCapital * Math.pow(1.10, i); // 依照現況調升預期年化
            plans.forEach(p => {
                let r = p.r/12, n = i*12;
                if(n>0) futureV += p.m * ((Math.pow(1+r, n)-1)/r);
            });
            data.push(Math.round(futureV));
            cost.push(Math.round(startCapital + monthlyTotal * 12 * i));
        }

        document.getElementById('totalValue').innerText = "NT$ " + data[data.length-1].toLocaleString();
        renderChart(labels, data, cost);
    }

    function renderChart(labels, data, cost) {
        const ctx = document.getElementById('vChart').getContext('2d');
        if (myChart) myChart.destroy();
        const grad = ctx.createLinearGradient(0, 0, 0, 200);
        grad.addColorStop(0, 'rgba(212, 175, 55, 0.4)');
        grad.addColorStop(1, 'rgba(212, 175, 55, 0)');

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '市值', data: data, borderColor: config[currentUser].color || '#D4AF37', 
                    borderWidth: 3, backgroundColor: grad, fill: true, tension: 0.4, pointRadius: 0
                }, {
                    label: '成本', data: cost, borderColor: 'rgba(255,255,255,0.15)', borderDash: [5,5], pointRadius: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { ticks: { color: '#64748b', callback: v => (v/10000)+'萬' }, grid: { color: 'rgba(255,255,255,0.03)' } },
                    x: { ticks: { color: '#64748b' }, grid: { display: false } }
                }
            }
        });
    }

    window.onload = fetchPrices;
    setInterval(fetchPrices, 300000); 
</script>
</body>
</html>

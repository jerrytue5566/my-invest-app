<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我們的財富成長計畫</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { 
      --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
      --sub: #94a3b8; --accent: #38bdf8; --success: #10b981; 
      --danger: #f87171; --zy-color: #f472b6; --jr-color: #38bdf8; 
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; }
    .container { max-width: 600px; margin: auto; }
    .market-strip { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
    .price-card { background: var(--card); padding: 12px; border-radius: 16px; min-width: 130px; border-left: 4px solid var(--accent); flex-shrink: 0; }
    .price-val { font-size: 17px; font-weight: bold; margin: 2px 0; }
    .tracking-card { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
    .total-main { text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .profit-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .p-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 14px; text-align: center; }
    .p-label { font-size: 10px; color: var(--sub); margin-bottom: 4px; }
    .p-val { font-size: 12px; font-weight: bold; }
    .config-section { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
    .user-config-group { margin-bottom: 15px; padding: 15px; border-radius: 16px; background: rgba(0,0,0,0.2); position: relative; overflow: hidden; border-left: 4px solid transparent; }
    .zy-side { border-left-color: var(--zy-color); }
    .jr-side { border-left-color: var(--jr-color); }
    .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    input { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px; border-radius: 8px; width: 85px; text-align: right; }
    .table-container { background: var(--card); border-radius: 24px; padding: 15px; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { color: var(--sub); text-align: right; padding: 8px; border-bottom: 1px solid #334155; }
    td { padding: 8px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .profit { color: var(--success); } .loss { color: var(--danger); }
  </style>
</head>
<body>
<div class="container">
  <div class="market-strip">
    <div class="price-card"><h4>VOO</h4><div id="vooP" class="price-val">--</div><div id="vooC" style="font-size:11px">--</div></div>
    <div class="price-card"><h4>QQQ</h4><div id="qqqP" class="price-val">--</div><div id="qqqC" style="font-size:11px">--</div></div>
    <div class="price-card"><h4>SSO</h4><div id="ssoP" class="price-val">--</div><div id="ssoC" style="font-size:11px">--</div></div>
  </div>

  <div class="tracking-card">
    <div class="total-main">
        <div class="p-label" style="color:var(--accent)">📊 雙人合計總損益 (TWD)</div>
        <div id="totalP" style="font-size: 28px; font-weight: 800; margin: 5px 0;">NT$ 0</div>
        <div id="totalROI" style="font-weight: bold;">+0.00%</div>
    </div>
    <div class="profit-row">
        <div class="p-box"><div class="p-label" style="color:var(--zy-color)">🌸 芷吟</div><div id="zyP" class="p-val">--</div></div>
        <div class="p-box"><div class="p-label" style="color:var(--jr-color)">💎 家瑞</div><div id="jrP" class="p-val">--</div></div>
        <div class="p-box"><div class="p-label">總市值</div><div id="allMarket" class="p-val">--</div></div>
    </div>
  </div>

  <div class="config-section">
    <div style="text-align: center; color: var(--success); font-size: 11px; margin-bottom: 15px; font-weight: bold;">📅 每月 7 號定期定額計畫 (TWD)</div>
    <div class="user-config-group zy-side">
        <div style="color:var(--zy-color); font-size:13px; font-weight:bold; margin-bottom:10px">🌸 芷吟 (定投 6,000)</div>
        <div class="input-row"><label>VOO 股數</label><input type="number" id="zyHold" value="10" oninput="updateAll()"></div>
        <div class="input-row"><label>平均成本</label><input type="number" id="zyCost" value="450" oninput="updateAll()"></div>
    </div>
    <div class="user-config-group jr-side">
        <div style="color:var(--jr-color); font-size:13px; font-weight:bold; margin-bottom:10px">💎 家瑞 (定投 20,000)</div>
        <div class="input-row"><label>VOO 股數</label><input type="number" id="jrHold" value="30" oninput="updateAll()"></div>
        <div class="input-row"><label>平均成本</label><input type="number" id="jrCost" value="460" oninput="updateAll()"></div>
    </div>
  </div>

  <div class="tracking-card" style="background:var(--card)"><canvas id="vChart" height="180"></canvas></div>

  <div class="table-container">
    <div style="color:var(--accent); font-weight:bold; margin-bottom:10px; font-size:13px">📅 35 年複利成長明細 (8%)</div>
    <table>
      <thead><tr><th style="text-align:left">年度</th><th>本金</th><th>預估資產</th></tr></thead>
      <tbody id="vTable"></tbody>
    </table>
  </div>
</div>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家瑞 & 芷吟的財富成長計畫</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
            --accent: #38bdf8; --success: #10b981; 
            --zy: #f472b6; --jr: #38bdf8; --border: #334155;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; line-height: 1.6; }
        .container { max-width:500px; margin:auto; }
        
        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border:1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .price-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px; }
        .p-box { background:rgba(255,255,255,0.05); padding:12px; border-radius:18px; text-align:center; border: 1px solid var(--border); }
        .p-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
        .profit { color:var(--success); font-weight:bold; font-size: 18px; }
        
        .user-tab { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: 0.3s; }
        .tab-btn.active-jr { background: var(--jr); color: #0f172a; font-weight: bold; }
        .tab-btn.active-zy { background: var(--zy); color: #0f172a; font-weight: bold; }

        .stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; }
        .highlight { font-weight: bold; color: var(--accent); }
        
        input[type="range"] { width: 100%; margin: 15px 0; accent-color: var(--accent); }
        .chart-container { height: 280px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 即時股價動態看板 -->
    <div class="price-grid">
        <div class="p-box"><div class="p-label">VOO</div><div id="vooP" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">QQQ</div><div id="qqqP" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">SSO</div><div id="ssoP" class="profit">--</div></div>
    </div>

    <!-- 用戶切換 -->
    <div class="user-tab">
        <button id="btnJR" class="tab-btn active-jr" onclick="switchUser('jr')">家瑞計畫</button>
        <button id="btnZY" class="tab-btn" onclick="switchUser('zy')">芷吟計畫</button>
    </div>

    <!-- 核心資產卡片 -->
    <div class="card" style="text-align:center;">
        <p id="userName" style="font-size:14px;color:#94a3b8">💎 家瑞 的預期財富 (TWD)</p>
        <h1 id="totalValue" style="font-size:36px;margin:10px 0; color: var(--success);">NT$ 0</h1>
        <div class="stat-row">
            <span>每月定期定額</span>
            <span id="monthlyInvest" class="highlight">NT$ 20,000</span>
        </div>
    </div>

    <!-- 模擬控制項 -->
    <div class="card">
        <div class="stat-row">
            <span>投資年限：<span id="yearVal" class="highlight">10</span> 年</span>
            <span>預期年化：<span class="highlight">10%</span></span>
        </div>
        <input type="range" id="yearSlider" min="1" max="40" value="10" oninput="update()">
        
        <div class="chart-container">
            <canvas id="vChart"></canvas>
        </div>
    </div>
</div>

<script>
    let currentUser = 'jr';
    let currentPrices = { voo: 510, qqq: 445 }; // 初始保底價
    let myChart = null;

    // 定義兩人配置
    const config = {
        jr: { 
            name: "家瑞", 
            plans: [{ticker: 'VOO', amount: 14000, rate: 0.08}, {ticker: 'QQQ', amount: 6000, rate: 0.11}],
            color: '#38bdf8'
        },
        zy: { 
            name: "芷吟", 
            plans: [{ticker: 'QQQ', amount: 6000, rate: 0.11}],
            color: '#f472b6'
        }
    };

    function switchUser(user) {
        currentUser = user;
        document.getElementById('btnJR').className = user === 'jr' ? 'tab-btn active-jr' : 'tab-btn';
        document.getElementById('btnZY').className = user === 'zy' ? 'tab-btn active-zy' : 'tab-btn';
        document.getElementById('userName').innerText = (user === 'jr' ? '💎 ' : '🌸 ') + config[user].name + " 的預期財富 (TWD)";
        update();
    }

    async function fetchPrices() {
        const key = "Mizli10RkulYZA1eeDqQKfKXfA8iGaji";
        try {
            const res = await fetch(`https://financialmodelingprep.com/api/v3/quote/VOO,QQQ,SSO?apikey=${key}`);
            const data = await res.json();
            data.forEach(s => {
                const el = document.getElementById(s.symbol.toLowerCase() + 'P');
                if (el) el.innerText = "$" + s.price.toFixed(1);
                if (s.symbol === "VOO") currentPrices.voo = s.price;
                if (s.symbol === "QQQ") currentPrices.qqq = s.price;
            });
        } catch (e) { console.log("使用保底價..."); }
        update();
    }

    function calculateCompound(years) {
        const userConfig = config[currentUser];
        const monthlyTotal = userConfig.plans.reduce((sum, p) => sum + p.amount, 0);
        let labels = [];
        let dataPoints = [];
        let costPoints = [];

        for (let i = 0; i <= years; i++) {
            labels.push(i + 'y');
            let yearEndValue = 0;
            
            userConfig.plans.forEach(plan => {
                const r = plan.rate / 12;
                const n = i * 12;
                // 複利公式: PMT * [((1 + r)^n - 1) / r]
                const val = n === 0 ? 0 : plan.amount * ((Math.pow(1 + r, n) - 1) / r);
                yearEndValue += val;
            });
            
            dataPoints.push(Math.round(yearEndValue));
            costPoints.push(monthlyTotal * 12 * i);
        }
        return { labels, dataPoints, costPoints, finalValue: dataPoints[dataPoints.length - 1], monthlyTotal };
    }

    function update() {
        const years = parseInt(document.getElementById('yearSlider').value);
        document.getElementById('yearVal').innerText = years;

        const result = calculateCompound(years);
        document.getElementById('totalValue').innerText = "NT$ " + result.finalValue.toLocaleString();
        document.getElementById('monthlyInvest').innerText = "NT$ " + result.monthlyTotal.toLocaleString();

        renderChart(result);
    }

    function renderChart(result) {
        const ctx = document.getElementById('vChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: result.labels,
                datasets: [
                    {
                        label: '預期市值',
                        data: result.dataPoints,
                        borderColor: config[currentUser].color,
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    },
                    {
                        label: '投入成本',
                        data: result.costPoints,
                        borderColor: '#475569',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } },
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { 
                            color: '#94a3b8',
                            callback: (val) => (val / 10000) + '萬' 
                        }
                    }
                }
            }
        });
    }

    window.onload = () => {
        fetchPrices();
        setInterval(fetchPrices, 60000); // 每分鐘更新一次股價
    };
</script>
</body>
</html>

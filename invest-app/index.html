<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我們的財富成長計畫</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --accent:#38bdf8; --success:#10b981; --zy:#f472b6; --jr:#38bdf8; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; }
        .container { max-width:500px; margin:auto; }
        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border:1px solid #334155; }
        .price-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px; }
        .p-box { background:rgba(255,255,255,0.05); padding:10px; border-radius:15px; text-align:center; }
        .profit { color:var(--success); font-weight:bold; }
        input { background:#0f172a; border:1px solid #475569; color:white; padding:5px 10px; border-radius:8px; width:80px; text-align:right; }
    </style>
</head>
<body>
<div class="container">
    <div class="price-grid">
        <div class="p-box">VOO<div id="vooP" class="profit">--</div></div>
        <div class="p-box">QQQ<div id="qqqP" class="profit">--</div></div>
        <div class="p-box">SSO<div id="ssoP" class="profit">--</div></div>
    </div>
    <div class="card" style="text-align:center;">
        <p style="font-size:12px;color:#94a3b8">📊 雙人合計總損益 (TWD)</p>
        <h1 id="totalP" style="font-size:32px;margin:10px 0;">NT$ 0</h1>
    </div>
    <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
            <span style="color:var(--zy)">🌸 芷吟 VOO</span>
            <input type="number" id="zH" value="10" oninput="update()">
        </div>
        <div style="display:flex;justify-content:space-between;">
            <span style="color:var(--jr)">💎 家瑞 VOO</span>
            <input type="number" id="jH" value="30" oninput="update()">
        </div>
    </div>
    <div class="card" style="height:250px;"><canvas id="vChart"></canvas></div>
</div>
<script>
    async function update() {
        const key = "Mizli10RkulYZA1eeDqQKfKXfA8iGaji";
        let vPrice = 510; // 萬一 API 沒回應的保底價
        try {
            const res = await fetch(`https://financialmodelingprep.com/api/v3/quote/VOO,QQQ,SSO?apikey=${key}`);
            const data = await res.json();
            data.forEach(s => {
                document.getElementById(s.symbol.toLowerCase()+'P').innerText = "$"+s.price.toFixed(1);
                if(s.symbol === "VOO") vPrice = s.price;
            });
        } catch(e) { console.log("API 載入中..."); }
        
        const zH = parseFloat(document.getElementById('zH').value)||0;
        const jH = parseFloat(document.getElementById('jH').value)||0;
        const totalProfit = ((vPrice - 450) * zH + (vPrice - 460) * jH) * 32.5;
        document.getElementById('totalP').innerText = "NT$ " + Math.round(totalProfit).toLocaleString();
        render();
    }
    function render() {
        if(window.myChart) window.myChart.destroy();
        const ctx = document.getElementById('vChart').getContext('2d');
        window.myChart = new Chart(ctx, {
            type:'line', data:{labels:['0y','10y','20y','35y'], datasets:[{data:[0,150,500,2000], borderColor:'#10b981', fill:true, tension:0.4}]},
            options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}}
        });
    }
    window.onload = update;
</script>
</body>
</html>

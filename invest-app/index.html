<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>投資信心觀測站</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="投資助手">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --sub: #94a3b8;
      --accent: #38bdf8;
      --success: #10b981;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .container { max-width: 600px; margin: auto; }

    h1 { font-size: 24px; text-align: center; margin-bottom: 20px; color: var(--accent); }

    /* 頂部數據格 */
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .card { background: var(--card); border-radius: 20px; padding: 15px; text-align: center; }
    .card h2 { font-size: 12px; color: var(--sub); margin-bottom: 5px; }
    .value { font-size: 28px; font-weight: bold; }

    /* 配置修改區 */
    .config-section { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .config-title { font-size: 16px; margin-bottom: 15px; color: var(--sub); border-bottom: 1px solid #334155; padding-bottom: 8px; }
    .input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    input { 
      background: #0f172a; border: 1px solid #334155; color: white; 
      padding: 8px; border-radius: 8px; width: 100px; text-align: right; font-size: 16px;
    }
    .ratio-badge { background: var(--accent); color: #0f172a; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }

    /* 信心增強區 */
    .confidence-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--success); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
    .confidence-title { color: var(--success); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
    .future-value { font-size: 24px; color: var(--text); margin: 10px 0; }
    .future-value span { color: var(--success); font-weight: 800; }

    canvas { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; margin-top: 10px; }
    
    .status-tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; margin-top: 5px; }
    .red { background: #7f1d1d; color: #fca5a5; }
    .green { background: #064e3b; color: #6ee7b7; }
  </style>
</head>
<body>

<div class="container">
  <h1>🛡️ 投資信心觀測站</h1>

  <div class="grid">
    <div class="card">
      <h2>CAPE (估值)</h2>
      <div class="value" id="capeVal">--</div>
      <div id="capeStatus" class="status-tag">分析中</div>
    </div>
    <div class="card">
      <h2>VIX (恐慌)</h2>
      <div class="value" id="vixVal">--</div>
      <div id="vixStatus" class="status-tag">分析中</div>
    </div>
  </div>

  <div class="config-section">
    <div class="config-title">🛠️ 即時資產配置 (點擊數字修改)</div>
    <div class="input-group">
      <span>VOO 持倉 (USD)</span>
      <input type="number" id="vooInput" value="14000" oninput="calcLogic()">
    </div>
    <div class="input-group">
      <span>QQQ 持倉 (USD)</span>
      <input type="number" id="qqqInput" value="6000" oninput="calcLogic()">
    </div>
    <div style="text-align: right; margin-top: 10px; font-size: 14px; color: var(--sub);">
      科技股比例：<span id="techRatio" class="ratio-badge">30%</span>
    </div>
  </div>

  <div class="confidence-card">
    <div class="confidence-title">✨ 複利力量：10年預期收益</div>
    <div class="future-value">預計資產將增長至：<br><span>$ <span id="futureVal">--</span></span></div>
    <p style="font-size: 12px; color: var(--sub);">*假設年化報酬率 8% (歷史平均)，資產翻倍只需約 9 年。</p>
    <canvas id="compoundChart" height="150"></canvas>
  </div>

  <div style="text-align: center; font-size: 11px; color: #475569;">
    最後數據更新：<span id="updateTime">--</span>
  </div>
</div>

<script>
  let compoundChart;

  function calcLogic() {
    const voo = parseFloat(document.getElementById('vooInput').value) || 0;
    const qqq = parseFloat(document.getElementById('qqqInput').value) || 0;
    const total = voo + qqq;

    // 計算比例
    const ratio = total === 0 ? 0 : Math.round((qqq / total) * 100);
    document.getElementById('techRatio').innerText = ratio + '%';

    // 計算 10 年複利 (假設 8% 年化)
    const years = 10;
    const rate = 0.08;
    const fValue = total * Math.pow(1 + rate, years);
    document.getElementById('futureVal').innerText = Math.round(fValue).toLocaleString();

    updateCompoundChart(total, rate);
  }

  function updateCompoundChart(startVal, rate) {
    const labels = [];
    const data = [];
    for (let i = 0; i <= 10; i++) {
      labels.push('第' + i + '年');
      data.push(Math.round(startVal * Math.pow(1 + rate, i)));
    }

    if (compoundChart) compoundChart.destroy();
    const ctx = document.getElementById('compoundChart').getContext('2d');
    compoundChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '資產增長預估',
          data: data,
          borderColor: '#10b981',
          backgroundColor: 'rgba(16, 185, 129, 0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { 
          y: { display: false },
          x: { ticks: { color: '#94a3b8', font: { size: 10 } } }
        }
      }
    });
  }

  function simulateMarket() {
    const cape = (32 + Math.random() * 5).toFixed(1);
    const vix = (15 + Math.random() * 10).toFixed(1);

    document.getElementById('capeVal').innerText = cape;
    document.getElementById('vixVal').innerText = vix;

    const cs = document.getElementById('capeStatus');
    cs.innerText = cape > 35 ? "估值偏高" : "估值合理";
    cs.className = "status-tag " + (cape > 35 ? "red" : "green");

    const vs = document.getElementById('vixStatus');
    vs.innerText = vix > 20 ? "情緒恐慌" : "市場樂觀";
    vs.className = "status-tag " + (vix > 20 ? "red" : "green");

    document.getElementById('updateTime').innerText = new Date().toLocaleTimeString();
  }

  // 初始化
  calcLogic();
  simulateMarket();
  setInterval(simulateMarket, 10000);
</script>

</body>
</html>

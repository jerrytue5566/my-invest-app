<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Vault Pro - High Fidelity</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #1a1a1a;            /* 深岩灰背景 */
            --card: #242424;          /* 稍淺卡片灰 */
            --gold: #D4AF37;          /* 家族黃 (金) */
            --jr-blue: #3b82f6;       /* 家瑞藍 */
            --zy-pink: #f472b6;       /* 芷吟粉 */
            --text: #e0e0e0; 
            --green: #10b981; 
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: "Inter", "Microsoft JhengHei", sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; transition: background 0.3s; }
        .container { max-width:480px; margin:auto; }

        /* 頂部四格報價：確保 Grid 橫向排版 */
        .price-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .p-box { 
            background: var(--card); padding: 12px 2px; border-radius: 12px; text-align: center; 
            border: 1px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        .p-label { font-size: 10px; color: var(--gold); font-weight: 800; }
        .profit { color: #fff; font-weight: bold; font-size: 12px; }

        /* BSS 面板 */
        .bss-container { background: var(--card); border: 1.5px solid var(--gold); border-radius: 20px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .bss-signal { font-size: 16px; font-weight: 900; color: #FFD700; }

        /* 帳戶切換按鈕：藍/粉/黃 三色 */
        .user-tab { display: flex; gap: 6px; margin-bottom: 15px; background: #000; padding: 4px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; color: #64748b; font-size: 12px; font-weight: bold; background: transparent; cursor: pointer; transition: 0.3s; }
        .tab-btn.active-jr { background: var(--jr-blue); color: #fff; }
        .tab-btn.active-zy { background: var(--zy-pink); color: #fff; }
        .tab-btn.active-all { background: var(--gold); color: #000; }

        /* 主市值卡片：動態邊框 */
        .main-card { 
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 2px solid var(--gold); 
            border-radius: 28px; padding: 25px 20px; text-align: center; margin-bottom: 15px;
            transition: all 0.4s ease;
        }
        .border-jr { border-color: var(--jr-blue) !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .border-zy { border-color: var(--zy-pink) !important; box-shadow: 0 0 15px rgba(244, 114, 182, 0.2); }
        .border-all { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        #totalValue { font-size: 34px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.1); }

        /* 輸入區與紀錄區 */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        input, select { background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px; flex: 1; outline: none; }
        
        /* 存入按鈕顏色連動 */
        .add-btn { color: #fff; border: none; border-radius: 10px; font-weight: bold; padding: 10px; cursor: pointer; flex: 1; transition: 0.3s; }
        .bg-jr { background: var(--jr-blue); }
        .bg-zy { background: var(--zy-pink); }
        .bg-all { background: var(--gold); color: #000; }

        .history-list { margin-top: 12px; font-size: 11px; max-height: 150px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }

        .refresh-btn { background: transparent; border: none; color: var(--gold); cursor: pointer; font-size: 14px; margin-left: 5px; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; color: var(--gold); flex-direction: column; gap: 10px; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div style="width: 30px; height: 30px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <span>同步數據中...</span>
</div>

<div class="container">
    <div class="price-grid">
        <div class="p-box"><div class="p-label">VOO</div><div id="voo-p" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">QQQ</div><div id="qqq-p" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">SSO</div><div id="sso-p" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">VIX</div><div id="vix-p" class="profit">--</div><button class="refresh-btn" onclick="syncCloud()">↻</button></div>
    </div>

    <div class="bss-container">
        <div id="bss-signal" class="bss-signal">連線中...</div>
        <div id="bss-logic" style="font-size: 10px; color: #94a3b8; margin-top:5px;">Google Finance 即時監測中</div>
    </div>

    <div class="user-tab">
        <button id="btnJR" class="tab-btn active-jr" onclick="switchUser('jr')">家瑞</button>
        <button id="btnZY" class="tab-btn" onclick="switchUser('zy')">芷吟</button>
        <button id="btnALL" class="tab-btn" onclick="switchUser('all')">家庭總額</button>
    </div>

    <div class="main-card border-jr">
        <p style="font-size:10px; color:var(--gold); font-weight: bold; letter-spacing: 2px;">LIVE ASSETS</p>
        <h1 id="totalValue">NT$ 0</h1>
        <div style="display:flex; justify-content: space-around; margin-top:15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:15px;">
            <div><p style="font-size:9px; color:#94a3b8">累積本金</p><p id="totalCost" style="font-size:14px; font-weight:bold;">0</p></div>
            <div><p style="font-size:9px; color:#94a3b8">當前損益</p><p id="totalProfit" style="font-size:14px; font-weight:bold;">+0</p></div>
        </div>
    </div>

    <div class="card" id="recordSection">
        <p style="font-size:13px; font-weight:bold; color:var(--gold);">➕ 雲端存入</p>
        <div class="input-group">
            <input type="date" id="logDate" style="width: 100%;">
            <select id="logTicker"><option value="VOO">VOO</option><option value="QQQ">QQQ</option></select>
            <input type="number" id="logAmount" placeholder="台幣金額">
            <button class="add-btn bg-jr" onclick="addRecord()">存入</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight: bold;">
            <span>年化預期：<span id="rateLabel" style="color:var(--gold)">--</span></span>
            <span>目標：<span id="yearVal" style="color:var(--gold)">10</span> 年</span>
        </div>
        <input type="range" id="yearSlider" min="1" max="40" value="10" oninput="updateUI()">
        <div class="chart-container"><canvas id="vChart"></canvas></div>
    </div>
</div>

<script>
    const CLOUD_API = "https://script.google.com/macros/s/AKfycbwLJCXl_h8KLURpyni0tixQuTHJiuqIq-RH3zXHCku2vKqC7NrtdhYgElJxiUCL-ZDL/exec";
    let currentUser = 'jr';
    let myChart = null;
    let prices = { voo: 0, qqq: 0, sso: 0, vix: 0 };
    const basePrices = { voo: 677.64, qqq: 705.22 };
    let cloudData = [];

    document.getElementById('logDate').valueAsDate = new Date();

    async function syncCloud() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(CLOUD_API);
            const response = await res.json();
            if (response.livePrices) { prices = response.livePrices; updateBSS(); }
            if (response.logs) { cloudData = response.logs; }
            updateUI();
        } catch (e) { console.error("Sync Failed", e); }
        document.getElementById('loading').style.display = 'none';
    }

    async function addRecord() {
        const date = document.getElementById('logDate').value;
        const ticker = document.getElementById('logTicker').value;
        const amount = parseFloat(document.getElementById('logAmount').value);
        if (!date || !amount) return;
        document.getElementById('loading').style.display = 'flex';
        try {
            await fetch(CLOUD_API, { method: "POST", mode: "no-cors", body: JSON.stringify({ date, user: currentUser, ticker, amount }) });
            setTimeout(syncCloud, 1500);
        } catch (e) { alert("寫入失敗"); }
        document.getElementById('logAmount').value = '';
    }

    function switchUser(u) {
        currentUser = u;
        document.getElementById('btnJR').className = u === 'jr' ? 'tab-btn active-jr' : 'tab-btn';
        document.getElementById('btnZY').className = u === 'zy' ? 'tab-btn active-zy' : 'tab-btn';
        document.getElementById('btnALL').className = u === 'all' ? 'tab-btn active-all' : 'tab-btn';
        
        const mainCard = document.querySelector('.main-card');
        mainCard.classList.remove('border-jr', 'border-zy', 'border-all');
        mainCard.classList.add(`border-${u}`);

        const addBtn = document.querySelector('.add-btn');
        addBtn.classList.remove('bg-jr', 'bg-zy', 'bg-all');
        addBtn.classList.add(`bg-${u}`);

        updateUI();
    }

    function updateBSS() {
        const sig = document.getElementById('bss-signal');
        const v = prices.vix;
        if (v >= 40) { sig.innerText = "🚨 十年一遇 All In"; sig.style.color = "#FF4444"; }
        else if (v >= 26) { sig.innerText = "⚖️ 分批買進模式"; sig.style.color = "#10B981"; }
        else { sig.innerText = "🔥 正常定期定額"; sig.style.color = "#D4AF37"; }
        ['voo','qqq','sso','vix'].forEach(s => { document.getElementById(`${s}-p`).innerText = prices[s].toFixed(2); });
    }

    function updateUI() {
        const history = currentUser === 'all' ? cloudData : cloudData.filter(d => (d.User === (currentUser === 'jr' ? 'jr' : 'zy') || d.User === (currentUser === 'jr' ? '家瑞' : '芷吟')));
        const listEl = document.getElementById('historyList'); listEl.innerHTML = '';
        let totalCost = 0, currentMV = 0;

        history.sort((a,b) => new Date(b.Date) - new Date(a.Date)).forEach(item => {
            const amt = parseFloat(item.Amount_TWD);
            totalCost += amt;
            const change = prices[item.Ticker.toLowerCase()] / basePrices[item.Ticker.toLowerCase()];
            currentMV += amt * change;
            if(currentUser !== 'all') {
                const div = document.createElement('div'); div.className = 'history-item';
                div.innerHTML = `<span>${new Date(item.Date).toLocaleDateString()} [${item.Ticker}]</span><b>$${amt.toLocaleString()}</b>`;
                listEl.appendChild(div);
            }
        });

        document.getElementById('totalValue').innerText = "NT$ " + Math.round(currentMV).toLocaleString();
        document.getElementById('totalCost').innerText = totalCost.toLocaleString();
        const p = currentMV - totalCost;
        const pEl = document.getElementById('totalProfit');
        pEl.innerText = (p>=0?"+":"") + Math.round(p).toLocaleString();
        pEl.style.color = p>=0 ? "var(--green)" : "#ef4444";

        const rate = (currentUser === 'jr') ? (14/20*0.111) : (currentUser === 'zy' ? 0.098 : 0.105);
        document.getElementById('rateLabel').innerText = (rate*100).toFixed(1) + "%";
        renderChart(currentMV, rate, currentUser === 'all' ? 26000 : (currentUser === 'jr' ? 20000 : 6000));
    }

    function renderChart(mv, rate, monthly) {
        const years = parseInt(document.getElementById('yearSlider').value);
        document.getElementById('yearVal').innerText = years;
        let labels = [], data = [], cost = [];
        for (let i = 0; i <= years; i++) {
            labels.push(i + 'y');
            let fv = mv * Math.pow(1 + rate, i);
            let r = rate/12, n = i*12; if(n > 0) fv += monthly * ((Math.pow(1+r, n)-1)/r);
            data.push(Math.round(fv)); cost.push(Math.round(mv + monthly * 12 * i));
        }
        const ctx = document.getElementById('vChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line', data: { labels, datasets: [{ label: '預期市值', data, borderColor: '#D4AF37', borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: 'rgba(212,175,55,0.1)', tension: 0.4 }, { label: '投入成本', data: cost, borderColor: 'rgba(255,255,255,0.1)', borderDash: [5,5], pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b', callback: v => (v/10000)+'萬' }, grid: { color: 'rgba(255,255,255,0.03)' } }, x: { ticks: { color: '#64748b' } } } }
        });
    }

    window.onload = syncCloud;
    setInterval(syncCloud, 300000);
</script>
</body>
</html>

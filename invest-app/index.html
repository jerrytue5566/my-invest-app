<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Vault Pro - Realtime Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* [保留原本樣式] */
        :root { --bg: #05070a; --card: #111827; --gold: #D4AF37; --gold-bright: #FFD700; --text: #f8fafc; --zy-pink: #f472b6; --green: #10b981; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Inter", sans-serif; }
        body { background:var(--bg); color:var(--text); padding:15px; }
        .container { max-width:480px; margin:auto; }
        .price-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; margin-bottom:15px; }
        .p-box { background: rgba(255, 255, 255, 0.03); padding: 12px 2px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); position: relative; }
        .p-label { font-size: 10px; color: var(--gold); font-weight: 800; }
        .profit { color: #fff; font-weight: bold; font-size: 12px; }
        .bss-container { background: linear-gradient(180deg, #1e293b 0%, #111827 100%); border: 2px solid var(--gold); border-radius: 20px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .bss-signal { font-size: 16px; font-weight: 900; }
        .main-card { background: radial-gradient(circle at top right, #1e293b, #05070a); border: 1px solid var(--gold); border-radius: 28px; padding: 25px 20px; text-align: center; margin-bottom: 15px; }
        #totalValue { font-size: 34px; font-weight: 900; text-shadow: 0 0 10px var(--gold); }
        .user-tab { display: flex; gap: 6px; margin-bottom: 15px; background: #1f2937; padding: 4px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; color: #64748b; font-size: 12px; font-weight: bold; background: transparent; cursor: pointer; }
        .tab-btn.active-jr { background: var(--gold); color: #000; }
        .tab-btn.active-zy { background: var(--zy-pink); color: #fff; }
        .card { background:var(--card); border-radius:24px; padding:20px; margin-bottom:15px; border: 1px solid #374151; }
        .chart-container { height: 180px; width: 100%; }
        .refresh-btn { position: absolute; top: -5px; right: -5px; background: var(--gold); border: none; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; color: var(--gold); flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div style="width: 30px; height: 30px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <span>同步 Google 官方報價中...</span>
</div>

<div class="container">
    <div class="price-grid">
        <div class="p-box"><div class="p-label">VOO</div><div id="voo-p" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">QQQ</div><div id="qqq-p" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">SSO</div><div id="sso-p" class="profit">--</div></div>
        <div class="p-box"><div class="p-label">VIX</div><div id="vix-p" class="profit">--</div><button class="refresh-btn" onclick="syncCloud()">↻</button></div>
    </div>

    <div class="bss-container">
        <div id="bss-signal" class="bss-signal">連線中...</div>
        <div id="bss-logic" style="font-size: 10px; color: #94a3b8; margin-top:5px;">正在對接 Google Finance 即時行情</div>
    </div>

    <!-- [保留原本帳戶切換、市值看板、記帳功能、圖表區塊，內容同前...] -->
    <div class="user-tab">
        <button id="btnJR" class="tab-btn active-jr" onclick="switchUser('jr')">家瑞</button>
        <button id="btnZY" class="tab-btn" onclick="switchUser('zy')">芷吟</button>
        <button id="btnALL" class="tab-btn" onclick="switchUser('all')">家庭總額</button>
    </div>

    <div class="main-card">
        <p style="font-size:10px; color:var(--gold); font-weight: bold; letter-spacing: 2px;">LIVE FAMILY ASSETS</p>
        <h1 id="totalValue">NT$ 0</h1>
        <div style="display:flex; justify-content: space-around; margin-top:15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:15px;">
            <div><p style="font-size:9px; color:#94a3b8">累積總本金</p><p id="totalCost" style="font-size:14px; font-weight:bold;">0</p></div>
            <div><p style="font-size:9px; color:#94a3b8">當前總損益</p><p id="totalProfit" style="font-size:14px; font-weight:bold;">+0</p></div>
        </div>
    </div>

    <div class="card" id="recordSection">
        <p style="font-size:13px; font-weight:bold; color:var(--gold);">➕ 雲端存入紀錄</p>
        <div class="input-group">
            <input type="date" id="logDate" style="width: 100%;">
            <select id="logTicker" style="flex: 1;"><option value="VOO">買 VOO</option><option value="QQQ">買 QQQ</option></select>
            <input type="number" id="logAmount" placeholder="台幣金額" style="flex: 2;">
            <button class="add-btn" onclick="addRecord()">存入</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight: bold; margin-bottom:10px;">
            <span>年化預期：<span id="rateLabel" style="color:var(--gold)">--</span></span>
            <span>複利目標：<span id="yearVal" style="color:var(--gold)">10</span> 年</span>
        </div>
        <input type="range" id="yearSlider" min="1" max="40" value="10" oninput="updateUI()">
        <div class="chart-container"><canvas id="vChart"></canvas></div>
    </div>
</div>

<script>
    const CLOUD_API = "https://script.google.com/macros/s/AKfycbwLJCXl_h8KLURpyni0tixQuTHJiuqIq-RH3zXHCku2vKqC7NrtdhYgElJxiUCL-ZDL/exec";
    let currentUser = 'jr';
    let myChart = null;
    let prices = { voo: 0, qqq: 0, sso: 0, vix: 0 };
    const basePrices = { voo: 677.64, qqq: 705.22 }; // 2026/05/08 基準價
    let cloudData = [];

    document.getElementById('logDate').valueAsDate = new Date();

    async function syncCloud() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(CLOUD_API);
            const response = await res.json();
            
            // 更新即時價格
            if (response.livePrices) {
                prices = response.livePrices;
                updateBSS();
            }
            
            // 更新投資紀錄
            if (response.logs) {
                cloudData = response.logs;
            }
            
            updateUI();
        } catch (e) { console.error("Cloud Sync Failed", e); }
        document.getElementById('loading').style.display = 'none';
    }

    // [保留 addRecord, switchUser, renderChart 等邏輯，同前版本...]
    async function addRecord() {
        const date = document.getElementById('logDate').value;
        const ticker = document.getElementById('logTicker').value;
        const amount = parseFloat(document.getElementById('logAmount').value);
        if (!date || !amount) return;
        document.getElementById('loading').style.display = 'flex';
        try {
            await fetch(CLOUD_API, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ date, user: currentUser, ticker, amount })
            });
            setTimeout(syncCloud, 1500);
        } catch (e) { alert("寫入失敗"); }
        document.getElementById('logAmount').value = '';
    }

    function updateBSS() {
        const sig = document.getElementById('bss-signal'), log = document.getElementById('bss-logic');
        const v = prices.vix;
        if (v >= 40) { sig.innerText = "🚨 十年一遇 All In"; sig.style.color = "#FF4444"; log.innerText="Google Finance 顯示目前恐慌情緒極高。"; }
        else if (v >= 26) { sig.innerText = "⚖️ 分批買進模式"; sig.style.color = "#10B981"; log.innerText="市場出現修正，適合分散佈局。"; }
        else { sig.innerText = "🔥 正常定期定額"; sig.style.color = "#94A3B8"; log.innerText="目前環境穩定，按原有計畫投資即可。"; }
        ['voo','qqq','sso','vix'].forEach(s => { 
            const el = document.getElementById(`${s}-p`);
            if(el) el.innerText = prices[s].toFixed(2); 
        });
    }

    function switchUser(u) {
        currentUser = u;
        document.getElementById('btnJR').className = u === 'jr' ? 'tab-btn active-jr' : 'tab-btn';
        document.getElementById('btnZY').className = u === 'zy' ? 'tab-btn active-zy' : 'tab-btn';
        document.getElementById('btnALL').className = u === 'all' ? 'tab-btn active-all' : 'tab-btn';
        updateUI();
    }

    function updateUI() {
        const history = currentUser === 'all' ? cloudData : cloudData.filter(d => (d.User === (currentUser === 'jr' ? 'jr' : 'zy') || d.User === (currentUser === 'jr' ? '家瑞' : '芷吟')));
        const listEl = document.getElementById('historyList'); listEl.innerHTML = '';
        let totalCost = 0, currentMV = 0;

        history.sort((a,b) => new Date(b.Date) - new Date(a.Date)).forEach(item => {
            const amt = parseFloat(item.Amount_TWD);
            totalCost += amt;
            // 計算損益
            const change = prices[item.Ticker.toLowerCase()] / basePrices[item.Ticker.toLowerCase()];
            currentMV += amt * change;
            
            if(currentUser !== 'all') {
                const div = document.createElement('div'); div.className = 'history-item';
                div.innerHTML = `<span>${new Date(item.Date).toLocaleDateString()} [${item.Ticker}]</span><b>$${amt.toLocaleString()}</b>`;
                listEl.appendChild(div);
            }
        });

        document.getElementById('totalValue').innerText = "NT$ " + Math.round(currentMV).toLocaleString();
        document.getElementById('totalCost').innerText = totalCost.toLocaleString();
        const p = currentMV - totalCost;
        const pEl = document.getElementById('totalProfit');
        pEl.innerText = (p>=0?"+":"") + Math.round(p).toLocaleString();
        pEl.style.color = p>=0 ? "var(--green)" : "#ef4444";

        const rate = (currentUser === 'jr') ? (14/20*0.098 + 6/20*0.142) : (currentUser === 'zy' ? 0.098 : (20/26*0.111 + 6/26*0.098));
        document.getElementById('rateLabel').innerText = (rate*100).toFixed(1) + "%";
        renderChart(currentMV, rate, currentUser === 'all' ? 26000 : (currentUser === 'jr' ? 20000 : 6000));
    }

    function renderChart(mv, rate, monthly) {
        const years = parseInt(document.getElementById('yearSlider').value);
        document.getElementById('yearVal').innerText = years;
        let labels = [], data = [], cost = [];
        for (let i = 0; i <= years; i++) {
            labels.push(i + 'y');
            let fv = mv * Math.pow(1 + rate, i);
            let r = rate/12, n = i*12; if(n > 0) fv += monthly * ((Math.pow(1+r, n)-1)/r);
            data.push(Math.round(fv)); cost.push(Math.round(mv + monthly * 12 * i));
        }
        const ctx = document.getElementById('vChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line', data: { labels, datasets: [{ label: '預期市值', data, borderColor: '#D4AF37', borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: 'rgba(212,175,55,0.1)', tension: 0.4 }, { label: '投入成本', data: cost, borderColor: 'rgba(255,255,255,0.1)', borderDash: [5,5], pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#64748b', callback: v => (v/10000)+'萬' }, grid: { color: 'rgba(255,255,255,0.03)' } }, x: { ticks: { color: '#64748b' } } } }
        });
    }

    window.onload = syncCloud;
    // 設定每 5 分鐘自動刷新一次雲端數據
    setInterval(syncCloud, 300000);
</script>

<style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</body>
</html>
